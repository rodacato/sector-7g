# Standard SonarQube project config. Copy to the app repo root.
# Set the key/name, then keep the block matching the stack and delete the rest.

sonar.projectKey=CHANGE_ME
sonar.projectName=CHANGE_ME
sonar.sourceEncoding=UTF-8

# ── Rails / Ruby ─────────────────────────────────────────────────────
# sonar.sources=app,lib
# sonar.tests=spec
# sonar.exclusions=db/**,vendor/**,node_modules/**,public/**,tmp/**,storage/**
# sonar.ruby.coverage.reportPaths=coverage/.resultset.json

# ── Node / Express / TS ──────────────────────────────────────────────
# sonar.sources=src,apps,packages
# sonar.tests=test,tests
# sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Go ───────────────────────────────────────────────────────────────
# sonar.sources=.
# sonar.exclusions=**/vendor/**,**/*_test.go
# sonar.tests=.
# sonar.test.inclusions=**/*_test.go
# sonar.go.coverage.reportPaths=coverage.out

# ── Python ───────────────────────────────────────────────────────────
# sonar.sources=src
# sonar.tests=tests
# sonar.python.coverage.reportPaths=coverage.xml

# ── Rust ─────────────────────────────────────────────────────────────
# sonar.sources=src
# sonar.exclusions=target/**

name: sonar (reusable)

# Standard SonarQube scan shared by all rodacato projects. Multi-language.
# Project-specific config (key, sources, coverage) lives in the app's
# sonar-project.properties — see templates/.

on:
  workflow_call:
    inputs:
      host_url:
        description: SonarQube base URL (pass vars.SONAR_HOST_URL from the caller).
        type: string
        required: true
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sonar:
    name: sonarqube scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history → accurate "new code" / blame dates
      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_HOST_URL: ${{ inputs.host_url }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

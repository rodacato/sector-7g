name: SonarQube scan
description: >-
  Run the standard rodacato SonarQube scan, pinned to one scanner version.
  The caller checks out the repo (fetch-depth: 0) and generates the coverage
  report before this step — coverage is stack-specific, the scan is not.

inputs:
  host_url:
    description: SonarQube base URL (pass vars.SONAR_HOST_URL).
    required: true
  token:
    description: SonarQube analysis token (pass secrets.SONAR_TOKEN).
    required: true
  project_base_dir:
    description: >-
      Directory the scan runs from; its sonar-project.properties is used.
      Set per-app to analyze a monorepo as separate Sonar projects (one bridge
      per app keeps the JS/TS analyzer's memory footprint down). Defaults to repo root.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: SonarQube scan
      uses: sonarsource/sonarqube-scan-action@v8.2.0
      with:
        projectBaseDir: ${{ inputs.project_base_dir }}
      env:
        SONAR_HOST_URL: ${{ inputs.host_url }}
        SONAR_TOKEN: ${{ inputs.token }}
